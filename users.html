<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <title>Users</title>
        
        <!--FONT-->
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

        <link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined" rel="stylesheet">
        

        <!--Custom CSS-->
        <link rel="stylesheet" href="styles.css">

        <!--Custom JS-->
        <script src="script.js"></script>
    </head>
    <body>
        <div class="grid-container">

            <!--Header-->
            <header class="header">
                <div class="header-left">
                    <a class="active" href="index.html">Home</a>
                    <a href="graph.html">Graphs</a>
                    <a href="users.html">Users</a>
                </div>
                <div class="header-right">
                    <div id="alert" style="display: none" class="alert">
                        <span class="closebtn" onclick="this.parentElement.style.display='none';">&times;</span>
                        <strong>Warning! TVOC</strong> Exceeding Normal Level!
                        <span class="material-symbols-outlined">error</span>
                    </div>
                </div> 

            </header>
            <!--Main-->
            <main class="main-container">
                <div class="main-title">
                    <h2>DASHBOARD</h2>
                    <h2 id="time"></h2>
                </div>

                <div class="main-cards">

                    <div class="card">
                        <div class="card-inner">
                            <h3>TEMPERATURE</h3>
                            <span class="material-symbols-outlined">device_thermostat</span>
                        </div>
                        <h1 id="temp"></h1>
                    </div>

                    <div class="card">
                        <div class="card-inner">
                            <h3>HUMIDITY</h3>
                            <span class="material-symbols-outlined">humidity_mid</span>
                        </div>
                        <h1 id="hum"></h1>
                    </div>

                    <div class="card">
                        <div class="card-inner">
                            <h3>C0²</h3>
                            <span class="material-symbols-outlined">co2</span>
                        </div>
                        <h1 id="gas"></h1>
                    </div>

                    <div class="card">
                        <div class="card-inner">
                            <h3>TVOC</h3>
                            <span class="material-symbols-outlined">detector_co</span>
                        </div>
                        <h1 id="tvoc"></h1>
                    </div>

                    <div class="card">
                        <div class="card-inner">
                            <h3>AQI</h3>
                            <span class="material-symbols-outlined">airwave</span>
                        </div>
                        <h1 id="aqi"></h1>
                    </div>

                    <div class="card">
                        <div class="card-inner">
                            <h3>CAPACITY</h3>
                            
                        </div>
                        <h1 id="cap"></h1>
                    </div>

                </div>

                


            </main>

                function whereisx(){

                }
                setInterval(whereisx,1000);
            </script>
        </div>
