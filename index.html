<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <title>Admin Dashboard</title>
        
        <!--FONT-->
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

        <link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined" rel="stylesheet">
        

        <!--Custom CSS-->
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <div class="grid-container">

            <!--Header-->
            <header class="header">
                <div class="header-left"></div>
                
                <div class="header-right">
                    <span class="material-symbols-outlined">notifications_active</span>
                </div>  
            </header>

            
            <!--Main-->
            <main class="main-container">
                <div class="main-title">
                    <h2>DASHBOARD</h2>
                </div>

                <div class="main-cards">

                    <div class="card">
                        <div class="card-inner">
                            <h3>TEMPERATURE</h3>
                            <span class="material-symbols-outlined">device_thermostat</span>
                        </div>
                        <h1 id="temp"></h1>
                    </div>

                    <div class="card">
                        <div class="card-inner">
                            <h3>HUMIDITY</h3>
                            <span class="material-symbols-outlined">humidity_mid</span>
                        </div>
                        <h1 id="hum"></h1>
                    </div>

                    <div class="card">
                        <div class="card-inner">
                            <h3>GAS</h3>
                            <span class="material-symbols-outlined">detector_co</span>
                        </div>
                        <h1 id="gas"></h1>
                    </div>

                    <div class="card">
                        <div class="card-inner">
                            <h3>AQI</h3>
                            <span class="material-symbols-outlined">airwave</span>
                        </div>
                        <h1 id="aqi"></h1>
                    </div>

                    <div class="card">
                        <div class="card-inner">
                            <h3>CAPACITY</h3>
                            <span class="material-symbols-outlined">delete</span>
                        </div>
                        <h1 id="cap"></h1>
                    </div>

                </div>

                


            </main>
        </div>

        <!--Custom JS-->
        <script src="script.js"></script>


        <!--Sensor Update-->
        <script>
            async function getData() {
                try {
                    const response = await fetch('presult.php');
                    if (!response.ok) throw new Error('Network response was not ok');
                    const data = await response.json(); // Parses JSON response from PHP
                    console.log(data);
                    //console.log("allo");
                    document.getElementById('temp').innerHTML = `${data.temperature}°C`;
                    document.getElementById('hum').innerHTML = `${data.humidity}%`;
                    document.getElementById('gas').innerHTML = `${data.gas}%`;
                    document.getElementById('aqi').innerHTML = `${data.aqi}%`;
                    document.getElementById('cap').innerHTML = `${data.capacity}%`;
                    document.getElementById('time').innerHTML = `${data.created_at}`;
                } catch (error) {
                    console.error('Fetch error:', error);
                }
            }
            setInterval(getData,2000);
        </script>
    </body>
</html>
