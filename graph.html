<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <title>Graphs</title>

        <!--FONT-->
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

        <link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined" rel="stylesheet">
        

        <!--Custom CSS-->
        <link rel="stylesheet" href="styles.css">

        
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script src="alarm.js"></script>
        
    </head>
    <body>
        <div class="grid-container">
            <header class="header">
                <div class="header-left">
                    <a class="active" href="index.html">Home</a>
                    <a href="graph.html">Graphs</a>
                    <a href="users.html">Users</a>
                </div>

                <div class="header-right">
                    <div id="alert" style="display: none" class="alert">
                        <span class="closebtn" onclick="this.parentElement.style.display='none';">&times;</span>
                        <strong>Warning! TVOC</strong> Exceeding Normal Level!
                        <span class="material-symbols-outlined">error</span>
                    </div>
                </div>
            </header>

            <main class="main-container">
                <div class="main-title">
                    <h2>Graphs</h2>
                </div>

                <div class="main-cards">

                    <div class="card">
                        <div class="card-inner">
                            <h3>TEMPERATURE</h3>
                            
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-inner">
                            <h3>HUMIDITY</h3>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-inner">
                            <h3>C0²</h3>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-inner">
                            <h3>TVOC</h3>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-inner">
                            <h3>AQI</h3>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-inner">
                            <h3>CAPACITY</h3>
                        </div>
                    </div>
                </div>

                <div class="charts">

                    <div class="charts-card">
                        <h2 class="chart-title">SMALL CHARTS</h2>
                        <canvas id="chart"></canvas>
                        <button onclick="fetchData()">Fetch</button>
                        <script>
                            
                            //Create Chart
                            const ctx = document.getElementById('chart');

                            let chart = new Chart(ctx, {
                                type: 'line', //Type of chart
                                data: {
                                    datasets: [{
                                        label: 'Gas', //Data label
                                        borderWidth: 1
                                    }]
                                },
                                options: {
                                    scales: {
                                        y: {
                                            ticks: {
                                                stepSize: 5 //Step size of Y axis
                                            },
                                        }
                                    }
                                }
                            });



                            async function fetchData() {
                                //Get new data from database
                                const response = await fetch('graph.php');
                                if (!response.ok) throw new Error('Network response was not ok');
                                const data = await response.json(); // Parses JSON response from PHP
                                console.log(data);
                                
                                //Assign data to var
                                const labels = data.time;
                                const value  = data.gas;
                                console.log(labels);
                                console.log(value);

                                //Only display 16 points at a time
                                if(chart.data.labels.length > 15) {
                                    chart.data.labels.shift();
                                    chart.data.datasets[0].data.shift();
                                }

                                //Update chart with new values
                                chart.data.labels.push(labels);
                                chart.data.datasets[0].data.push(value);
                                chart.update();
                            };
                            setInterval(fetchData,5000); //Repeat function every 5s

                            
                        </script>
                        
                    </div> 
                </div>
            </main>
        </div>
    </body>
</html>
