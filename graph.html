<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <title>Graphs</title>

        <!--FONT-->
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

        <link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined" rel="stylesheet">
        

        <!--Custom CSS-->
        <link rel="stylesheet" href="styles.css">

        
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script src="script.js"></script>
        
    </head>
    <body>
        <div class="grid-container">
            <header class="header">
                <div class="header-left">
                    <a class="active" href="index.html">Home</a>
                    <a href="graph.html">Graphs</a>
                    <a href="users.html">Users</a>
                </div>

                <div class="header-right">
                    <div id="alert" style="display: none" class="alert">
                        <span class="closebtn" onclick="this.parentElement.style.display='none';">&times;</span>
                        <strong>Warning! TVOC</strong> Exceeding Normal Level!
                        <span class="material-symbols-outlined">error</span>
                    </div>
                </div>
            </header>

            <main class="main-container">
                <div class="main-title">
                    <h2>Graphs</h2>
                </div>

                <div class="main-cards">

                    <div class="card">
                        <div class="card-inner">
                            <h3>TEMPERATURE</h3>
                            
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-inner">
                            <h3>HUMIDITY</h3>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-inner">
                            <h3>C0²</h3>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-inner">
                            <h3>TVOC</h3>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-inner">
                            <h3>AQI</h3>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-inner">
                            <h3>CAPACITY</h3>
                        </div>
                    </div>
                </div>

                <div class="charts">

                    <div class="charts-card">
                        <h2 class="chart-title">SMALL CHARTS</h2>
                        <canvas id="chart"></canvas>
                        <button onclick="fetchData()">Fetch</button>
                        <script>

                            const ctx = document.getElementById('chart');

                            let chart = new Chart(ctx, {
                                type: 'line',
                                data: {
                                    //labels: ['Red', 'Blue', 'Yellow', 'Green', 'Purple', 'Orange'],
                                    datasets: [{
                                        label: '# of Votes',
                                        //data: [12, 19, 3, 5, 2, 3],
                                        borderWidth: 1
                                    }]
                                },
                                options: {
                                scales: {
                                    y: {
                                    beginAtZero: true
                                    }
                                }
                                }
                            });


                            async function fetchData() {
                                const response = await fetch('aa.json');
                                if (!response.ok) throw new Error('Network response was not ok');
                                const data = await response.json(); // Parses JSON response from PHP
                                console.log(data);
                                
                                
                                const labels = data.created_at;
                                const temp  = data.temperature;
                                console.log(labels);
                                console.log(temp);

                                chart.data.labels.push(labels);
                                chart.data.datasets[0].data.push(temp);
                                chart.update();
                            };
                            setInterval(fetchData,1000);

                            
                        </script>
                        
                    </div> 
                </div>
            </main>
        </div>
    </body>
</html>
