<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <title>Graphs</title>

        <!--FONT-->
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

        <link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined" rel="stylesheet">
        

        <!--Custom CSS-->
        <link rel="stylesheet" href="styles.css">

        <!--<script src="https://cdnjs.cloudflare.com/ajax/libs/apexcharts/5.3.5/apexcharts.min.js"></script>-->
        <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
        <script src="script.js"></script>
        
    </head>
    <body>
        <div class="grid-container">
            <header class="header">
                <div class="header-left">
                    <a class="active" href="index.html">Home</a>
                    <a href="graph.html">Graphs</a>
                    <a href="users.html">Users</a>
                </div>

                <div class="header-right">
                    <div id="alert" style="display: none" class="alert">
                        <span class="closebtn" onclick="this.parentElement.style.display='none';">&times;</span>
                        <strong>Warning! TVOC</strong> Exceeding Normal Level!
                        <span class="material-symbols-outlined">error</span>
                    </div>
                </div>
            </header>

            <main class="main-container">
                <div class="main-title">
                    <h2>Graphs</h2>
                </div>

                <div class="main-cards">

                    <div class="card">
                        <div class="card-inner">
                            <h3>TEMPERATURE</h3>
                            
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-inner">
                            <h3>HUMIDITY</h3>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-inner">
                            <h3>C0²</h3>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-inner">
                            <h3>TVOC</h3>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-inner">
                            <h3>AQI</h3>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-inner">
                            <h3>CAPACITY</h3>
                        </div>
                    </div>
                </div>

                <div class="charts">
                    
                    <div class="charts-card">
                        <h2 class="chart-title">BIG CHARTS</h2>
                        <div id="bar-chart"></div>
                    </div>

                    <div class="charts-card">
                        <h2 class="chart-title">SMALL CHARTS</h2>
                        <div id="chart"></div>
                        <script>
                            var options = {
          series: [{
          name: 'TEAM A',
          type: 'area',
          data: [44, 55, 31, 47, 31, 43, 26, 41, 31, 47, 33]
        }, {
          name: 'TEAM B',
          type: 'line',
          data: [55, 69, 45, 61, 43, 54, 37, 52, 44, 61, 43]
        }],
          chart: {
          height: 350,
          type: 'line',
        },
        stroke: {
          curve: 'smooth'
        },
        fill: {
          type:'solid',
          opacity: [0.35, 1],
        },
        labels: ['Dec 01', 'Dec 02','Dec 03','Dec 04','Dec 05','Dec 06','Dec 07','Dec 08','Dec 09 ','Dec 10','Dec 11'],
        markers: {
          size: 0
        },
        yaxis: [
          {
            title: {
              text: 'Series A',
            },
          },
          {
            opposite: true,
            title: {
              text: 'Series B',
            },
          },
        ],
        tooltip: {
          shared: true,
          intersect: false,
          y: {
            formatter: function (y) {
              if(typeof y !== "undefined") {
                return  y.toFixed(0) + " points";
              }
              return y;
            }
          }
        }
        };

        var chart = new ApexCharts(document.querySelector("#chart"), options);
        chart.render();
                        </script>
                    </div> 
                </div>
            </main>
        </div>
    </body>
</html>
