<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">

        <title>Graphs</title>

        <!--FONT-->
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

        <link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined" rel="stylesheet">
        

        <!--Custom CSS-->
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <div class="grid-container">
            <header class="header">
                <div class="header-left">
                    <a class="active" href="index.html">Home</a>
                    <a href="graph.html">Graphs</a>
                    <a href="">Users</a>
                </div>

                <div class="header-right">
                    <div id="alert" style="display: none" class="alert">
                        <span class="closebtn" onclick="this.parentElement.style.display='none';">&times;</span>
                        <strong>Warning! TVOC</strong> Exceeding Normal Level!
                        <span class="material-symbols-outlined">error</span>
                    </div>
                    <script>
                        let x;
                        
                        setInterval(function dis() {
                            if (x >= 1000) {
                                document.getElementById("alert").style.display = "";
                            }
                            else {
                                document.getElementById("alert").style.display = "none";
                            }
                        },1000);
                    </script>
                </div> 
            </header>
        </div>

        <!--Sensor Update-->
        <script>
            setInterval(async function getData() {
                try {
                    const response = await fetch('presult.php');
                    if (!response.ok) throw new Error('Network response was not ok');
                    const data = await response.json(); // Parses JSON response from PHP
                    console.log(data);

                    document.getElementById('tvoc').innerHTML = `${data.tvoc}PPB`;
                    
                    x = `${data.tvoc}`;

                } catch (error) {
                    console.error('Fetch error:', error);
                }
                
            },2000);
            
        </script>
    </body>
</html>
