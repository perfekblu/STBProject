<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <title>Graphs</title>

        <!--FONT-->
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

        <link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined" rel="stylesheet">
        

        <!--Custom CSS-->
        <link rel="stylesheet" href="styles.css">

        
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script src="alarm.js"></script>
        
        
    </head>
    <body>
        <div class="grid-container">
            <header class="header">
                <div class="header-left">
                    <a class="active" href="index.html">Home</a>
                    <a href="graph.html">Graphs</a>
                    <a href="users.html">Users</a>
                </div>

                <div class="header-right">
                    <div id="tvoc.alert" style="display: none" class="alert">
                        <span class="closebtn" onclick="this.parentElement.style.display='none';">&times;</span>
                        <strong>Warning! TVOC</strong> Exceeding Normal Level!
                        <span class="material-symbols-outlined">error</span>
                    </div>
                    <div id="lid.alert" style="display: none" class="alert">
                        <span class="closebtn" onclick="this.parentElement.style.display='none';">&times;</span>
                        <strong>TRASH BIN FULL!</strong> Need To Empty!
                        <span class="material-symbols-outlined">error</span>
                    </div>
                </div>
            </header>

            <main class="main-container">
                <div class="main-title">
                    <h2>Graphs</h2>
                </div>

                <div class="charts">

                    <div class="charts-card">
                        <h2 class="chart-title">SMALL CHARTS</h2>
                        <form>
                        <select name="users" onchange="fetchData(this.value)">
                            <option value="">Select Data:</option>
                            <option value="temperature">Temperature</option>
                            <option value="humidity">Humidity</option>
                            <option value="gas">Gas</option>
                            <option value="tvoc">TVOC</option>
                            <option value="capacity">Capacity</option>
                        </select>
                        </form>

                        <canvas id="chart"></canvas>
                        <!--<button onclick="graphinfo()">Fetch</button>-->
                        <script>
                            
                            //Create Chart
                            const ctx = document.getElementById('chart');

                            let chart = new Chart(ctx, {
                                type: 'line', //Type of chart
                                data: {
                                    //labels: laabels,
                                    datasets: [{
                                        label: 'Gas', //Data label
                                        borderWidth: 1,
                                        //data: vaalues,
                                    }]
                                },
                                options: {
                                    scales: {
                                        y: {
                                            ticks: {
                                                stepSize: 5 //Step size of Y axis
                                            },
                                        }
                                    }
                                }
                            });

                            async function graphinfo(str) {
                                try {
                                    let dataq = new URLSearchParams();
                                    dataq.append(`q`, str);
                                    console.log(dataq.getAll(`q`));

                                    const options = {
                                        method: `POST`,
                                        body: dataq
                                    };
                                    //Get user data from database
                                    const response = await fetch('graphselect.php',options);
                                    if (!response.ok) throw new Error('Network response was not ok');
                                    const data = await response.json(); // Parses JSON response from PHP
                                    console.log(data);
                                    
                                    chart.innerHTML = "";
                                    

                                    data.forEach(row => {
                                        //labels.push(row.time_recorded);
                                        //values.push(row.gas);

                                        const labels = `${row.time}`;
                                        const value  = `${row.value}`;

                                        //console.log(labels);
                                        //console.log(value);

                                        chart.data.labels.push(labels);
                                        chart.data.datasets[0].data.push(value);
                                        
                                    });
                                    chart.update();

                                } catch (error) {
                                    console.error('Fetch Error: ', error);
                                }
                            }
                            graphinfo();



                            async function fetchData(str) {
                                try{
                                    let dataq = new URLSearchParams();
                                    dataq.append(`q`, str);
                                    console.log(dataq.getAll(`q`));

                                    const options = {
                                        method: `POST`,
                                        body: dataq
                                    };


                                    //Get new data from database
                                    const response = await fetch('graph.php');
                                    if (!response.ok) throw new Error('Network response was not ok');
                                    const data = await response.text(); // Parses JSON response from PHP
                                    console.log(data);
                                    
                                    //Assign data to var
                                    const labels = data.time;
                                    const value  = data.value;
                                    console.log(labels);
                                    console.log(value);

                                    //Only display 16 points at a time
                                    if(chart.data.labels.length > 30) {
                                        chart.data.labels.shift();
                                        chart.data.datasets[0].data.shift();
                                    }

                                    //Update chart with new values
                                    chart.data.labels.push(labels);
                                    chart.data.datasets[0].data.push(value);
                                    chart.update();  
                                    } catch (error) {
                                        console.error('Fetch Error: ', error);
                                    }
                                };
                            setInterval(fetchData,5000); //Repeat function every 5s

                            
                        </script>
                        
                    </div> 
                </div>
            </main>
        </div>
    </body>
</html>
